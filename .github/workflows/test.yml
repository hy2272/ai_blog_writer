name: test

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need base history for the iteration-log diff check

      - name: System-changing PRs append to the iteration log
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          # Same SYSTEM-path set as .githooks/pre-commit, so the two guards agree:
          # pure doc / handoff / article PRs are NOT system changes and pass freely.
          system="$(printf '%s\n' "$changed" | grep -E \
            '^(platforms/|tools/|\.claude/|\.githooks/|\.github/workflows/|common/behavior_notes/|common/style_patterns\.md|CLAUDE\.md)' \
            || true)"
          if [ -z "$system" ]; then
            echo "OK: no system files changed (pure doc/handoff/article PR) — log entry not required."
            exit 0
          fi
          if printf '%s\n' "$changed" | grep -qx "handoff/ITERATION_LOG.md"; then
            echo "OK: system files changed and the iteration log was updated."
          else
            echo "::error::System files changed but handoff/ITERATION_LOG.md is not in this PR — append a what/why/risk/verified entry (CLAUDE.md convention)."
            echo "Changed system files:"
            printf '  %s\n' $system
            exit 1
          fi

      - name: Compile Python tools
        run: python3 -m py_compile tools/*.py platforms/xiaohongshu/*.py

      - name: Apify client fails cleanly without a token (offline, no cost)
        run: |
          python3 - <<'PY'
          import tools.apify_client as ac
          ac.load_env_key = lambda name="APIFY_API_KEY": None  # simulate no token anywhere
          try:
              ac.run_actor("x~y", {}, token=None)
          except ac.ApifyError as e:
              assert "APIFY_API_KEY" in str(e), str(e)
              print("OK: raised ApifyError without a token")
          else:
              raise SystemExit("expected ApifyError when no token is configured")
          PY

      - name: Positive citation audit fixture passes
        run: |
          python3 tools/citation_audit.py articles/article_demo/sections/sec1_draft.md \
            --source-pack articles/article_demo/source_pack.json \
            --contract articles/article_demo/contracts/sec1_contract.json \
            --as-of 2026-06-09

      - name: run_oracle dispatcher passes through the oracle verbatim
        run: |
          # NB: this workflow's shell is `bash -e`, so a bare `cmd; var=$?` DIES at cmd on
          # any non-zero exit before the assert runs (this exact step broke main after #23).
          # Capture expected non-zero exits with `|| var=$?` — a condition context -e ignores.
          # exit-code parity: dispatcher must equal a direct oracle call (green + red)
          direct_ok=0; python3 tools/aesthetic_audit.py tests/fixtures/aesthetic/good_post.json >/dev/null || direct_ok=$?
          disp_ok=0; python3 tools/run_oracle.py --mode aesthetic_lifestyle tests/fixtures/aesthetic/good_post.json >/dev/null || disp_ok=$?
          test "$direct_ok" = "0" && test "$disp_ok" = "0" || { echo "green passthrough mismatch"; exit 1; }
          python3 tools/run_oracle.py --mode aesthetic tests/fixtures/aesthetic/bad_em_dash.json >/dev/null && { echo "bad fixture should fail"; exit 1; } || true
          # trailing oracle args are forwarded (factual needs --source-pack)
          python3 tools/run_oracle.py --mode tech_news tests/fixtures/article_good_final/sections/sec1_draft.md \
            --source-pack tests/fixtures/article_good_final/source_pack.json >/dev/null || { echo "factual passthrough failed"; exit 1; }
          # a mode whose oracle has not shipped fails honestly (exit 3), not silently
          rc=0; python3 tools/run_oracle.py --mode explainer tests/fixtures/aesthetic/good_post.json || rc=$?
          test "$rc" = "3" || { echo "explainer (no oracle) should exit 3, got $rc"; exit 1; }

      - name: gemini_polish offline diff catches oracle regressions (no API)
        run: |
          # aesthetic: injecting a 破折号 must flip the oracle PASS->FAIL in the before/after delta
          python3 - <<'PY'
          import json
          p=json.load(open("tests/fixtures/aesthetic/good_post.json"))
          p["cards"][1]["text"]="煮一杯咖啡——看热气散开。"
          json.dump(p,open("/tmp/aes_polished.json","w"),ensure_ascii=False,indent=2)
          PY
          out="$(python3 tools/gemini_polish.py tests/fixtures/aesthetic/good_post.json \
            --mode aesthetic_lifestyle --polished /tmp/aes_polished.json --diff-html /tmp/aes_diff.html)"
          echo "$out"
          echo "$out" | grep -q "exit 0→1" || { echo "expected pre-PASS -> post-FAIL delta"; exit 1; }
          echo "$out" | grep -q "em-dash" || { echo "delta should name the introduced em-dash"; exit 1; }
          test -f /tmp/aes_diff.html || { echo "diff html not written"; exit 1; }

      - name: Positive grounding fixture passes
        run: |
          python3 tools/grounding_gate.py articles/article_demo/sections/grounding_2to3.json \
            --allowed-outline-ids 1 \
            --allowed-source-ids S1,S2,S3

      - name: Positive grounding 1->2 fixture passes
        run: |
          python3 tools/grounding_gate.py tests/fixtures/grounding/good_1to2.json \
            --allowed-source-ids S1,S2

      - name: status.py aggregates per-stage section results
        run: |
          out="$(python3 tools/status.py tests/fixtures/status)"
          echo "$out"
          echo "$out" | grep -q "section stages" || { echo "missing section matrix"; exit 1; }
          # sec2 fact-check is MISATTRIBUTED -> the aggregator must derive a 'fail'
          echo "$out" | grep -q "fail" || { echo "aggregator did not surface the failing stage"; exit 1; }
          # the fixture journal drives the cost column + run totals (malformed line skipped)
          echo "$out" | grep -q '\$0.31' || { echo "missing sec1 journal cost"; exit 1; }
          echo "$out" | grep -q 'recorded cost \$0.97' || { echo "missing journal totals line"; exit 1; }
          echo "$out" | grep -q '1 malformed skipped' || { echo "malformed journal line not tolerated"; exit 1; }

      - name: status.py without a journal is unchanged (no cost column)
        run: |
          rm -rf /tmp/status_nojournal
          cp -r tests/fixtures/status /tmp/status_nojournal
          rm /tmp/status_nojournal/run_journal.jsonl
          out="$(python3 tools/status.py /tmp/status_nojournal)"
          echo "$out"
          echo "$out" | grep -q "cost" && { echo "cost column must not appear without a journal"; exit 1; } || true

      - name: journal.py appends valid events, fails fast on bad ones, summarizes
        run: |
          rm -rf /tmp/journal_smoke && mkdir -p /tmp/journal_smoke
          python3 tools/journal.py append /tmp/journal_smoke --event dispatch --stage S3-writer --section 1 --agent writer
          python3 tools/journal.py append /tmp/journal_smoke --event result --stage S3-writer --section 1 \
            --agent writer --status pass --tokens-total 48213 --cost-usd 0.31
          python3 tools/journal.py append /tmp/journal_smoke --event gate --stage S4-citation-audit --section 1 \
            --gate citation_audit --exit-code 0
          # usage errors exit 2 and append NOTHING
          if python3 tools/journal.py append /tmp/journal_smoke --event result --stage S3-writer; then
            echo "result without --status unexpectedly passed"; exit 1; fi
          if python3 tools/journal.py append /tmp/no_such_article_dir --event note --note x; then
            echo "missing article dir unexpectedly passed"; exit 1; fi
          python3 - <<'PY'
          import json
          lines = [json.loads(l) for l in open('/tmp/journal_smoke/run_journal.jsonl', encoding='utf-8')]
          assert len(lines) == 3, f"expected 3 events, got {len(lines)}"
          assert all('ts' in l for l in lines)
          assert lines[1]['cost_usd'] == 0.31 and lines[1]['tokens']['total'] == 48213
          assert lines[2]['status'] == 'pass', "gate exit 0 must derive status pass"
          print("OK: journal lines valid")
          PY
          out="$(python3 tools/journal.py summary /tmp/journal_smoke)"
          echo "$out"
          echo "$out" | grep -q 'sec1 1/3' || { echo "summary missing step-budget count"; exit 1; }
          echo "$out" | grep -q 'recorded cost \$0.31' || { echo "summary missing cost total"; exit 1; }

      - name: Positive article audit fixture passes
        run: python3 tools/audit_article.py articles/article_demo --as-of 2026-06-09

      - name: new_article.py scaffolds a complete workspace
        run: |
          rm -rf /tmp/scaffold_ci
          python3 tools/new_article.py ci-smoke --articles-dir /tmp/scaffold_ci
          for f in STATE.md DECISIONS.md source_pack.json outline.json contracts sections stage_results; do
            test -e "/tmp/scaffold_ci/article_ci-smoke/$f" || { echo "scaffold missing $f"; exit 1; }
          done
          python3 tools/outline_ids.py /tmp/scaffold_ci/article_ci-smoke/outline.json --check

      - name: outline_ids.py validates and emits ids
        run: |
          ids="$(python3 tools/outline_ids.py articles/article_demo/outline.json)"
          test "$ids" = "1" || { echo "expected ids '1', got '$ids'"; exit 1; }
          if python3 tools/outline_ids.py tests/fixtures/outline/bad_outline.json; then
            echo "malformed outline unexpectedly passed"
            exit 1
          fi

      - name: Positive final article fixture passes
        run: python3 tools/audit_article.py tests/fixtures/article_good_final --as-of 2026-06-09

      - name: Humanized draft is audited as a first-class artifact
        run: python3 tools/audit_article.py tests/fixtures/article_good_final --draft humanized.md --as-of 2026-06-09

      - name: A humanized draft that dropped a citation FAILs
        run: |
          rm -rf /tmp/article_humanized_bad
          cp -r tests/fixtures/article_good_final /tmp/article_humanized_bad
          python3 - <<'PY'
          from pathlib import Path
          p = Path("/tmp/article_humanized_bad/humanized.md")
          p.write_text(p.read_text(encoding="utf-8").replace("[S2]", ""), encoding="utf-8")
          PY
          if python3 tools/audit_article.py /tmp/article_humanized_bad --draft humanized.md --as-of 2026-06-09; then
            echo "humanized draft missing [S2] unexpectedly passed"
            exit 1
          fi

      - name: Xiaohongshu long-image adapter builds package
        run: |
          python3 tools/xhs_image_post.py tests/fixtures/article_good_final/final.md \
            --out-dir /tmp/xhs_image_post \
            --no-render
          test -f /tmp/xhs_image_post/card_01.html
          test -f /tmp/xhs_image_post/post_xiaohongshu.txt
          test -f /tmp/xhs_image_post/content_manifest.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("/tmp/xhs_image_post/content_manifest.json").read_text(encoding="utf-8"))
          assert manifest["format"] == "long_image_post"
          assert manifest["default"] is True
          # cover (hook + reading route merged) + at least one content card
          assert manifest["card_count"] >= 2
          assert manifest["cards"][0]["kind"] == "cover"
          assert manifest["caption"] == "post_xiaohongshu.txt"
          PY

      - name: Xiaohongshu adapter never overflows a card
        run: |
          python3 tools/xhs_image_post.py tests/fixtures/xhs/long_paragraph.md \
            --out-dir /tmp/xhs_long \
            --no-render
          python3 - <<'PY'
          import json
          from pathlib import Path
          from platforms.xiaohongshu.adapter import MAX_BODY_CHARS
          manifest = json.loads(Path("/tmp/xhs_long/content_manifest.json").read_text(encoding="utf-8"))
          # An over-wide paragraph must be split across cards; no card may exceed one
          # card-width budget. Assert against the adapter's own constant so the test
          # tracks the configured density instead of a hardcoded number. Cards are the product.
          assert manifest["max_body_chars"] <= MAX_BODY_CHARS, manifest["max_body_chars"]
          # still proves the over-wide paragraph was split across multiple body cards
          assert manifest["card_count"] >= 4, manifest["card_count"]
          PY

      - name: Xiaohongshu meta sidecar drives cover + caption; traceable numbers pass
        run: |
          python3 tools/xhs_image_post.py tests/fixtures/article_good_final/final.md \
            --out-dir /tmp/xhs_meta_good \
            --no-render \
            --meta tests/fixtures/xhs/meta_good.json \
            --check-caption
          python3 - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("/tmp/xhs_meta_good/content_manifest.json").read_text(encoding="utf-8"))
          assert manifest["cover_title"] == "用了一年AI工具，我赌这6件事会变", manifest["cover_title"]
          assert manifest["caption_unverified_numbers"] == [], manifest["caption_unverified_numbers"]
          PY

      - name: Xiaohongshu caption that invents a number fails --check-caption
        run: |
          if python3 tools/xhs_image_post.py tests/fixtures/article_good_final/final.md \
            --out-dir /tmp/xhs_meta_bad \
            --no-render \
            --meta tests/fixtures/xhs/meta_bad.json \
            --check-caption; then
            echo "ERROR: invented-number caption should have failed --check-caption"
            exit 1
          fi

      - name: Negative citation fixtures fail
        run: |
          if python3 tools/citation_audit.py tests/fixtures/citation/bad_missing_citation.md \
            --source-pack articles/article_demo/source_pack.json \
            --as-of 2026-06-09; then
            echo "bad_missing_citation.md unexpectedly passed"
            exit 1
          fi

          if python3 tools/citation_audit.py tests/fixtures/citation/bad_unknown_source_id.md \
            --source-pack articles/article_demo/source_pack.json \
            --as-of 2026-06-09; then
            echo "bad_unknown_source_id.md unexpectedly passed"
            exit 1
          fi

      - name: Source-authority — tier-1 source passes
        run: |
          python3 tools/citation_audit.py tests/fixtures/citation/authority/draft.md \
            --source-pack tests/fixtures/citation/authority/pack_tier1.json \
            --source-authority common/source_authority.json --as-of 2026-06-30

      - name: Source-authority — blacklisted/aggregator source FAILs
        run: |
          if python3 tools/citation_audit.py tests/fixtures/citation/authority/draft.md \
            --source-pack tests/fixtures/citation/authority/pack_blacklisted.json \
            --source-authority common/source_authority.json --as-of 2026-06-30; then
            echo "blacklisted source unexpectedly passed"
            exit 1
          fi

      - name: Source-authority — no tier-1/2 anchor FAILs under --strict
        run: |
          if python3 tools/citation_audit.py tests/fixtures/citation/authority/draft.md \
            --source-pack tests/fixtures/citation/authority/pack_unranked.json \
            --source-authority common/source_authority.json --as-of 2026-06-30 --strict; then
            echo "unranked-only source unexpectedly passed under --strict"
            exit 1
          fi

      - name: Positive fact-check verdict passes
        run: python3 tools/factcheck_gate.py tests/fixtures/factcheck/good.json

      - name: Negative fact-check verdicts fail
        run: |
          for f in bad_misattributed bad_unverified bad_empty; do
            if python3 tools/factcheck_gate.py tests/fixtures/factcheck/$f.json; then
              echo "factcheck $f.json unexpectedly passed"
              exit 1
            fi
          done

      - name: Negative grounding fixtures fail
        run: |
          if python3 tools/grounding_gate.py tests/fixtures/grounding/bad_2to3_no_outline_ids.json \
            --allowed-outline-ids 1 \
            --allowed-source-ids S1; then
            echo "bad_2to3_no_outline_ids.json unexpectedly passed"
            exit 1
          fi

          if python3 tools/grounding_gate.py tests/fixtures/grounding/bad_2to3_only_source_ids.json \
            --allowed-outline-ids 1 \
            --allowed-source-ids S1; then
            echo "bad_2to3_only_source_ids.json unexpectedly passed"
            exit 1
          fi

          if python3 tools/grounding_gate.py tests/fixtures/grounding/bad_1to2_no_sources.json \
            --allowed-source-ids S1,S2; then
            echo "bad_1to2_no_sources.json unexpectedly passed"
            exit 1
          fi

      - name: Negative final article fixture fails
        run: |
          if python3 tools/audit_article.py tests/fixtures/article_bad_final --as-of 2026-06-09; then
            echo "bad final fixture unexpectedly passed"
            exit 1
          fi

      - name: Grounding fails closed on an empty verdict; --allow-empty passes
        run: |
          if python3 tools/grounding_gate.py tests/fixtures/grounding/bad_empty.json --allowed-outline-ids 1; then
            echo "empty grounding verdict unexpectedly passed"
            exit 1
          fi
          python3 tools/grounding_gate.py tests/fixtures/grounding/bad_empty.json --allow-empty

      - name: Banned-phrase check flags a 翻译腔 draft; demo stays clean
        run: |
          if python3 tools/citation_audit.py tests/fixtures/citation/bad_banned_phrase.md \
            --source-pack articles/article_demo/source_pack.json \
            --banned-phrases common/banned_phrases.json --as-of 2026-06-09; then
            echo "banned-phrase draft unexpectedly passed"
            exit 1
          fi
          python3 tools/citation_audit.py articles/article_demo/sections/sec1_draft.md \
            --source-pack articles/article_demo/source_pack.json \
            --contract articles/article_demo/contracts/sec1_contract.json \
            --banned-phrases common/banned_phrases.json --as-of 2026-06-09

      - name: audit_article passes --source-authority + --banned-phrases through
        run: |
          python3 tools/audit_article.py articles/article_demo --as-of 2026-06-09 \
            --source-authority common/source_authority.json \
            --banned-phrases common/banned_phrases.json

      - name: Aesthetic audit — good post passes
        run: python3 tools/aesthetic_audit.py tests/fixtures/aesthetic/good_post.json

      - name: Aesthetic audit — bad posts fail (dash / numbering / quote / overline / provenance)
        run: |
          for f in bad_em_dash bad_numbering bad_unverified_quote bad_ai_overline \
                   bad_quote_no_provenance bad_quote_card_no_record bad_embedded_quote_no_record \
                   bad_backdoor_switch; do
            if python3 tools/aesthetic_audit.py tests/fixtures/aesthetic/$f.json; then
              echo "aesthetic $f.json unexpectedly passed"
              exit 1
            fi
          done

      - name: Quote-verification exemption is CLI-only, not a post-JSON backdoor
        run: |
          # A writer setting quote_verification_required:false in the data must NOT bypass —
          # it still FAILs (and the backdoor attempt is flagged). The exemption is CLI-only.
          if python3 tools/aesthetic_audit.py tests/fixtures/aesthetic/bad_backdoor_switch.json; then
            echo "post-JSON quote_verification_required:false unexpectedly bypassed the gate"
            exit 1
          fi
          # The runner (not the data) may relax the check: --allow-unverified-quotes downgrades
          # the quote findings to WARN, so a no-provenance quote then PASSes.
          python3 tools/aesthetic_audit.py tests/fixtures/aesthetic/bad_quote_no_provenance.json \
            --allow-unverified-quotes

      - name: Card-rhythm warns on content-word clustering but exempts function words
        run: |
          # 「光」on 5 of 6 cards is real 氛围 collapse -> WARN -> FAIL under --strict.
          if python3 tools/aesthetic_audit.py tests/fixtures/aesthetic/warn_rhythm_content.json --strict; then
            echo "content-word clustering unexpectedly passed --strict"
            exit 1
          fi
          # 「我」on 5 of 6 is the natural diary voice, not clustering -> exempt -> PASS.
          python3 tools/aesthetic_audit.py tests/fixtures/aesthetic/rhythm_stopword_ok.json --strict

      - name: Banned-phrase scan skips the References block by default; --scope all catches it
        run: |
          python3 tools/citation_audit.py tests/fixtures/citation/references_banned_phrase.md \
            --source-pack articles/article_demo/source_pack.json \
            --banned-phrases common/banned_phrases.json --as-of 2026-06-09
          if python3 tools/citation_audit.py tests/fixtures/citation/references_banned_phrase.md \
            --source-pack articles/article_demo/source_pack.json \
            --banned-phrases common/banned_phrases.json --banned-phrases-scope all --as-of 2026-06-09; then
            echo "references banned phrase unexpectedly passed under --banned-phrases-scope all"
            exit 1
          fi

      - name: Aesthetic post renders through the adapter; card text matches the audited JSON
        run: |
          rm -rf /tmp/xhs_ae
          python3 platforms/xiaohongshu/adapter.py \
            --aesthetic-json tests/fixtures/aesthetic/good_post.json \
            --out-dir /tmp/xhs_ae --no-render
          python3 - <<'PY'
          import json
          from pathlib import Path
          m = json.loads(Path("/tmp/xhs_ae/content_manifest.json").read_text(encoding="utf-8"))
          post = json.loads(Path("tests/fixtures/aesthetic/good_post.json").read_text(encoding="utf-8"))
          # audited object == rendered object: same count, same per-card text
          assert m["card_count"] == len(post["cards"]), (m["card_count"], len(post["cards"]))
          for mc, pc in zip(m["cards"], post["cards"]):
              assert mc["text"] == pc["text"], (mc["text"], pc["text"])
          print("OK: manifest card text matches aesthetic_post.json")
          PY

      - name: Aesthetic --check-caption checks against card text, not the caption itself
        run: |
          rm -rf /tmp/ae_cap_good /tmp/ae_cap_bad
          python3 platforms/xiaohongshu/adapter.py \
            --aesthetic-json tests/fixtures/aesthetic/good_post.json \
            --out-dir /tmp/ae_cap_good --no-render --check-caption
          if python3 platforms/xiaohongshu/adapter.py \
            --aesthetic-json tests/fixtures/aesthetic/caption_invents_number.json \
            --out-dir /tmp/ae_cap_bad --no-render --check-caption; then
            echo "invented-number caption unexpectedly passed --check-caption on the aesthetic path"
            exit 1
          fi

      - name: gen_image --dry-run makes no API call and writes a manifest (offline, no cost)
        run: |
          rm -f /tmp/img_manifest.json
          python3 tools/gen_image.py --prompt "quiet morning window, warm light, film grain, no text" \
            --out /tmp/card1.png --aspect 4:5 --dry-run \
            --manifest /tmp/img_manifest.json --palette "warm morning" --purpose "cover panel" --reusable
          test ! -f /tmp/card1.png   # dry-run must NOT produce an image
          python3 - <<'PY'
          import json
          from pathlib import Path
          m = json.loads(Path("/tmp/img_manifest.json").read_text(encoding="utf-8"))
          rec = m["images"][0]
          assert rec["dry_run"] is True and rec["reusable"] is True, rec
          assert rec["prompt"].endswith("no text"), rec["prompt"]
          PY
